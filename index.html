<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Music Producer — с базой тегов</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#121212;color:#eee;font-family:Arial,sans-serif;padding:20px;min-height:100vh;display:flex;justify-content:center;align-items:center}
.container{max-width:950px;width:100%;background:#1a1a1a;border-radius:16px;padding:30px;box-shadow:0 8px 32px rgba(0,0,0,0.6);border:1px solid #2a2a2a}

h1{font-size:22px;color:#00ffcc;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1 small{font-size:13px;color:#666;font-weight:normal}

.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#aaa;margin-bottom:4px;font-weight:600}
.field textarea,.field input,.field select{width:100%;background:#0f0f0f;color:#ddd;border:1px solid #333;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;transition:border 0.2s}
.field textarea{min-height:80px;resize:vertical;font-family:'Consolas',monospace;font-size:13px;line-height:1.6}
.field textarea:focus,.field input:focus,.field select:focus{border-color:#00ffcc;outline:none}
.field textarea.result{min-height:200px;color:#a9ffb6;background:#0a0a0a;border-color:#1a3a2a}

.row{display:flex;gap:12px;flex-wrap:wrap}
.row .field{flex:1;min-width:120px}

.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
.btn{padding:10px 20px;border:none;border-radius:8px;font-weight:bold;font-size:14px;cursor:pointer;transition:all 0.2s;flex:1;min-width:110px;text-align:center}
.btn:hover{transform:scale(1.02)}
.btn:active{transform:scale(0.98)}

.btn-ai{background:#2d6b3f;color:#fff}
.btn-ai:hover{background:#3a8a52}

.btn-generate{background:linear-gradient(135deg,#4f46e5,#3730a3);color:#fff}
.btn-generate:hover{background:linear-gradient(135deg,#5a52e9,#4338ca)}

.btn-copy{background:#5e35b1;color:#fff}
.btn-copy:hover{background:#4a2a8f}
.btn-download{background:#00897b;color:#fff}
.btn-download:hover{background:#00695c}

.btn-preset{background:#1a2a3a;color:#88ccff;border:1px solid #2a4a5a;flex:0 1 auto;padding:6px 14px;font-size:12px;border-radius:20px;cursor:pointer}
.btn-preset:hover{background:#2a3a4a;border-color:#00ffcc}

.status{padding:12px;border-radius:8px;margin:10px 0;display:none;font-size:14px}
.status.success{background:#0a2a1a;border-left:4px solid #00ffcc;display:block;color:#aaffcc}
.status.error{background:#2a0a0a;border-left:4px solid #ff4444;display:block;color:#ff8888}
.status.info{background:#0a1a2a;border-left:4px solid #4488ff;display:block;color:#88ccff}

audio{width:100%;margin-top:12px;border-radius:8px;background:#0a0a0a;display:none}

.debug{background:#0a0a0a;border-radius:6px;padding:10px;margin-top:12px;font-family:monospace;font-size:11px;color:#666;border:1px solid #1a1a1a;max-height:150px;overflow-y:auto;line-height:1.5;white-space:pre-wrap;word-break:break-all}

.loader{display:none;align-items:center;justify-content:center;gap:16px;padding:16px;background:#0f0f1a;border-radius:8px;margin:10px 0;border:1px solid #2a2a3a}
.loader .dots{display:flex;gap:4px}
.loader .dots span{display:block;width:6px;height:6px;background:#4f46e5;border-radius:50%;animation:bounce 1.2s infinite}
.loader .dots span:nth-child(2){animation-delay:0.2s}
.loader .dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.4);opacity:0.4}40%{transform:scale(1);opacity:1}}
.loader-text{color:#88ccff;font-size:13px;font-weight:bold}

.badge{font-size:11px;color:#888;background:#1a1a1a;padding:2px 10px;border-radius:12px;border:1px solid #2a2a2a}
.seed-random{background:#2a2a3a;color:#88ccff;border:1px solid #3a3a5a;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;white-space:nowrap}
.seed-random:hover{background:#3a3a5a}

.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.preset-row .btn-preset{flex:0 1 auto}
.found-tags{background:#0a1a0a;border:1px solid #1a3a2a;border-radius:6px;padding:8px 12px;margin-top:8px;font-size:12px;color:#88ccff;display:none}
.found-tags strong{color:#00ffcc}
</style>
</head>
<body>

<div class="container">
    <h1>
        🎵 AI Music Producer
        <small>с базой тегов</small>
    </h1>

    <div class="preset-row">
        <span style="color:#666;font-size:12px;align-self:center;">Быстрый старт:</span>
        <button class="btn-preset" onclick="loadPreset('folk')">🌾 Фолк</button>
        <button class="btn-preset" onclick="loadPreset('neoclassical')">🎻 Классика</button>
        <button class="btn-preset" onclick="loadPreset('ambient')">🌌 Эмбиент</button>
        <button class="btn-preset" onclick="loadPreset('cinematic')">🎬 Кино</button>
        <button class="btn-preset" onclick="loadPreset('jazz')">🎷 Джаз</button>
    </div>

    <div class="field">
        <label>📝 Опишите музыку словами</label>
        <textarea id="userInput" placeholder="Например: спокойная медитативная музыка с фортепиано и струнными"></textarea>
    </div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn-preset" data-mood="calm" onclick="setMood('calm')" style="border-color:#2a6a5a">🌊 Спокойная</button>
        <button class="btn-preset" data-mood="epic" onclick="setMood('epic')" style="border-color:#6a4a2a">⚡ Эпичная</button>
        <button class="btn-preset" data-mood="sad" onclick="setMood('sad')" style="border-color:#4a2a4a">🌧 Меланхоличная</button>
        <button class="btn-preset" data-mood="happy" onclick="setMood('happy')" style="border-color:#4a6a2a">☀️ Радостная</button>
        <button class="btn-preset" data-mood="mysterious" onclick="setMood('mysterious')" style="border-color:#2a3a6a">🌙 Таинственная</button>
    </div>

    <div class="found-tags" id="foundTags">
        🏷️ Найдены теги: <span id="tagsList"></span>
    </div>

    <div class="row">
        <div class="field">
            <label>🔑 API Key (Google AI Studio)</label>
            <input type="password" id="apiKey" placeholder="Вставьте ваш API-ключ">
        </div>
        <div class="field" style="flex:0.5">
            <label>⏱ BPM</label>
            <input type="text" id="bpm" value="80" placeholder="60-140">
        </div>
    </div>

    <div class="row">
        <div class="field" style="flex:1">
            <label>🎲 Seed <span style="color:#666;font-weight:normal;font-size:11px;">(для повторяемости)</span></label>
            <div style="display:flex;gap:8px;">
                <input type="text" id="seed" placeholder="Оставьте пустым для случайного">
                <button class="seed-random" onclick="randomSeed()">🎲</button>
            </div>
        </div>
        <div class="field" style="flex:0.5">
            <label>📦 Формат <span style="color:#666;font-weight:normal;font-size:11px;">(конвертация)</span></label>
            <select id="audioFormat">
                <option value="mp3">MP3 (сжатый)</option>
                <option value="wav">WAV (качественный)</option>
            </select>
        </div>
    </div>

    <div class="field">
        <label>🎼 Готовый промпт для Lyria <span class="badge">можно править</span></label>
        <textarea id="finalPrompt" class="result" placeholder="Нажмите '🤖 Сгенерировать промпт'"></textarea>
    </div>

    <div class="btn-group">
        <button class="btn btn-ai" onclick="generatePrompt()">🤖 Gemini улучшит промпт</button>
        <button class="btn btn-generate" onclick="generateAudio()">🚀 Lyria создаст аудио</button>
        <button class="btn btn-copy" onclick="copyPrompt()">📋 Копировать</button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadAudio()" style="display:none;">💾 Скачать</button>
    </div>

    <div id="status" class="status"></div>

    <div id="loader" class="loader">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="loader-text" id="loaderText">🎵 Lyria синтезирует звук...</div>
    </div>

    <audio id="player" controls></audio>

    <div class="debug" id="debugInfo">
        💡 Напишите описание и нажмите "Gemini улучшит промпт"
    </div>
</div>

<script type="module">
// ============================================================
// ИМПОРТ БАЗЫ ТЕГОВ ИЗ ОТДЕЛЬНОГО ФАЙЛА
// ============================================================
import { 
    STYLE_DATABASE, 
    PRESETS, 
    findTagsInDatabase,
    getTagCount 
} from './styles.js';

console.log(`📚 База загружена. Тегов: ${getTagCount()}`);

// ============================================================
// СОСТОЯНИЕ
// ============================================================
let currentMood = 'calm';
let currentAudioBase64 = null;
let currentMimeType = 'audio/mpeg';

// Делаем данные доступными глобально
window.STYLE_DATABASE = STYLE_DATABASE;
window.PRESETS = PRESETS;
window.findTagsInDatabase = findTagsInDatabase;

// ============================================================
// ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ============================================================
function showStatus(message, type = 'info') {
    const el = document.getElementById('status');
    el.textContent = message;
    el.className = `status ${type}`;
}

function showLoader(show, text = '⏳ Обработка...') {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
    document.getElementById('loaderText').textContent = text;
}

function showFoundTags(tags) {
    const container = document.getElementById('foundTags');
    const list = document.getElementById('tagsList');
    if (tags && tags.length > 0) {
        list.textContent = tags.join(', ');
        container.style.display = 'block';
    } else {
        container.style.display = 'none';
    }
}

// ============================================================
// ГЛОБАЛЬНЫЕ ФУНКЦИИ (для onclick)
// ============================================================
window.setMood = function(mood) {
    currentMood = mood;
    document.querySelectorAll('[data-mood]').forEach(btn => {
        btn.style.borderColor = btn.dataset.mood === mood ? '#00ffcc' : '';
        btn.style.background = btn.dataset.mood === mood ? '#00ffcc22' : '';
    });
};

window.randomSeed = function() {
    document.getElementById('seed').value = Math.floor(Math.random() * 1000000000);
};

window.loadPreset = function(name) {
    const preset = PRESETS[name];
    if (!preset) return;
    
    document.getElementById('userInput').value = preset.desc;
    document.getElementById('bpm').value = preset.bpm;
    document.getElementById('finalPrompt').value = `${preset.desc}, ${preset.bpm} bpm, pure instrumental, no vocals\n\n${preset.structure}`;
    
    const found = findTagsInDatabase(preset.desc);
    showFoundTags(found);
    
    const moodMap = { folk: 'calm', neoclassical: 'sad', ambient: 'mysterious', cinematic: 'epic', jazz: 'calm' };
    window.setMood(moodMap[name] || 'calm');
    showStatus(`✅ Пресет "${name}" загружен`, 'success');
};

window.copyPrompt = function() {
    const text = document.getElementById('finalPrompt').value;
    if (!text.trim()) {
        showStatus('❌ Нет промпта для копирования', 'error');
        return;
    }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            showStatus('📋 Скопировано!', 'success');
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showStatus('📋 Скопировано!', 'success');
        });
    }
};

// ============================================================
// ГЕНЕРАЦИЯ ПРОМПТА
// ============================================================
window.generatePrompt = async function() {
    const userText = document.getElementById('userInput').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    const bpm = document.getElementById('bpm').value || '80';
    
    if (!userText) {
        showStatus('❌ Напишите описание музыки!', 'error');
        return;
    }
    
    const foundTags = findTagsInDatabase(userText);
    showFoundTags(foundTags);
    
    if (!apiKey) {
        let tagString = foundTags.length > 0 ? foundTags.join(', ') : 'peaceful, meditative';
        const localPrompt = `Pure instrumental, no vocals. ${tagString}. ${userText}. ${bpm} bpm.`;
        document.getElementById('finalPrompt').value = localPrompt;
        document.getElementById('debugInfo').innerHTML = `🧠 Локальный режим (без API)\n🏷️ Найдено: ${foundTags.length > 0 ? foundTags.join(', ') : 'не найдено'}`;
        showStatus('💡 Использую локальный шаблон (без API)', 'info');
        return;
    }
    
    showLoader(true, '🧠 Gemini анализирует...');
    showStatus('⚡ Отправка в Gemini...', 'info');
    
    try {
        const MODEL = 'gemini-2.5-flash';
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;
        
        let tagsHint = foundTags.length > 0 
            ? `В базе есть теги: ${foundTags.join(', ')}. Используй их если подходят.`
            : 'В базе нет подходящих тегов. Используй свои знания.';
        
        const promptForAI = `Ты эксперт по музыкальным промптам для Lyria 3 Pro.
Пользователь хочет музыку: "${userText}"
Темп: ${bpm} BPM
Настроение: ${currentMood}

${tagsHint}

Преврати это в профессиональный промпт. Начинай с "Pure instrumental, no vocals".
Добавь структуру: [Intro], [Verse], [Chorus], [Bridge], [Outro], [End - 3:00].
Ответ ТОЛЬКО промптом.`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: promptForAI }] }]
            })
        });
        
        showLoader(false);
        
        if (!response.ok) {
            let errMsg = `Ошибка ${response.status}`;
            try {
                const errData = await response.json();
                if (errData.error?.message) errMsg = errData.error.message;
            } catch(e) {}
            throw new Error(errMsg);
        }
        
        const data = await response.json();
        const aiPrompt = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        
        if (!aiPrompt) throw new Error('Пустой ответ от Gemini');
        
        document.getElementById('finalPrompt').value = aiPrompt;
        document.getElementById('debugInfo').innerHTML = `
✅ Промпт улучшен через Gemini
🏷️ Найдено тегов: ${foundTags.length > 0 ? foundTags.join(', ') : 'не найдено'}
📝 Длина: ${aiPrompt.length} символов
🤖 Модель: ${MODEL}`;
        
        showStatus('✅ Промпт готов! Можете править вручную.', 'success');
        
    } catch (err) {
        showLoader(false);
        showStatus(`❌ Ошибка: ${err.message}`, 'error');
        document.getElementById('debugInfo').innerHTML = `❌ ${err.message}`;
    }
};

// ============================================================
// ГЕНЕРАЦИЯ АУДИО
// ============================================================
window.generateAudio = async function() {
    const prompt = document.getElementById('finalPrompt').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    const seed = document.getElementById('seed').value.trim();
    const player = document.getElementById('player');
    const downloadBtn = document.getElementById('downloadBtn');
    
    if (!prompt) {
        showStatus('❌ Сначала сгенерируйте промпт!', 'error');
        return;
    }
    if (!apiKey) {
        showStatus('❌ Вставьте API-ключ!', 'error');
        return;
    }
    
    try { localStorage.setItem('lyria_api_key', apiKey); } catch(e) {}
    
    showLoader(true, '🎵 Lyria синтезирует звук...');
    showStatus('🎵 Генерация аудио...', 'info');
    player.style.display = 'none';
    downloadBtn.style.display = 'none';
    
    try {
        const payload = { contents: [{ parts: [{ text: prompt }] }] };
        if (seed) payload.generationConfig = { seed: parseInt(seed, 10) };
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/lyria-3-pro-preview:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        showLoader(false);
        
        if (!response.ok) {
            let errMsg = `Ошибка ${response.status}`;
            try {
                const errData = await response.json();
                if (errData.error?.message) errMsg = errData.error.message;
            } catch(e) {}
            throw new Error(errMsg);
        }
        
        const data = await response.json();
        console.log('✅ Ответ Lyria:', data);
        
        let audioBase64 = null;
        let mimeType = 'audio/mpeg';
        
        if (data.candidates && data.candidates.length > 0) {
            for (const candidate of data.candidates) {
                if (candidate.content && candidate.content.parts) {
                    for (const part of candidate.content.parts) {
                        if (part.inlineData && part.inlineData.data) {
                            audioBase64 = part.inlineData.data;
                            mimeType = part.inlineData.mimeType || 'audio/mpeg';
                            break;
                        }
                    }
                }
                if (audioBase64) break;
            }
        }
        
        if (!audioBase64) {
            const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (textResponse) throw new Error(`Lyria вернула текст: ${textResponse.slice(0, 150)}...`);
            throw new Error('Аудио не найдено в ответе');
        }
        
        currentAudioBase64 = audioBase64;
        currentMimeType = mimeType;
        
        player.src = `data:${mimeType};base64,${audioBase64}`;
        player.style.display = 'block';
        downloadBtn.style.display = 'block';
        
        try { await player.play(); } catch(e) {}
        
        document.getElementById('debugInfo').innerHTML = `
✅ АУДИО ГОТОВО!
🎵 Формат: ${mimeType}
📊 Размер: ${Math.round(audioBase64.length / 1024)} KB
🎲 Seed: ${seed || 'случайный'}`;
        
        showStatus(`✅ Композиция готова!`, 'success');
        
    } catch (err) {
        showLoader(false);
        showStatus(`❌ Ошибка: ${err.message}`, 'error');
    }
};

// ============================================================
// СКАЧИВАНИЕ
// ============================================================
window.downloadAudio = function() {
    if (!currentAudioBase64) {
        showStatus('❌ Нет аудио', 'error');
        return;
    }
    
    const format = document.getElementById('audioFormat').value;
    const ext = format === 'wav' ? 'wav' : 'mp3';
    const mime = format === 'wav' ? 'audio/wav' : 'audio/mpeg';
    
    try {
        const byteString = atob(currentAudioBase64);
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
        const blob = new Blob([ab], { type: mime });
        
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `track.${ext}`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        
        showStatus(`💾 Скачивание ${ext.toUpperCase()}...`, 'success');
    } catch (err) {
        showStatus(`❌ Ошибка: ${err.message}`, 'error');
    }
};

// ============================================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================================
console.log('🎵 AI Music Producer готов!');
console.log(`📚 База тегов: ${getTagCount()} тегов`);
</script>
</body>
</html>
